<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bb86fc">
    <title>RegexPro Tester & Extractor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>RegexPro <span>Tester</span></h1>
            <div class="header-controls">
                <select id="theme">
                    <option value="dark">🌙 Dark</option>
                    <option value="light">☀️ Light</option>
                </select>
                <button id="toggle-cheatsheet" class="btn outline">Cheat Sheet</button>
            </div>
        </header>

        <div id="cheatsheet-panel" class="hidden panel">
            <h3>Regex Cheat Sheet</h3>
            <p><code>\d</code> Digit | <code>\w</code> Word | <code>\s</code> Whitespace | <code>^</code> Start | <code>$</code> End | <code>+</code> 1 or more | <code>*</code> 0 or more | <code>?</code> Optional | <code>(?&lt;name&gt;...)</code> Named Group</p>
        </div>

        <div class="input-grid">
            <div class="box">
                <label>Regular Expression</label>
                <div class="regex-input-wrapper">
                    <span class="slash">/</span>
                    <input type="text" id="regex-pattern" placeholder="Tulis pola regex (misal: \d+)">
                    <span class="slash">/</span>
                    <input type="text" id="regex-flags" placeholder="gmi" value="g" maxlength="6">
                </div>
                <div id="regex-error" class="error-text"></div>
                
                <div class="controls-row">
                    <button id="save-regex-btn" class="btn">💾 Simpan Pola</button>
                    <select id="regex-history"><option value="">-- Pola Tersimpan --</option></select>
                    <select id="regex-presets">
                        <option value="">-- Preset Umum --</option>
                        <option value="email">Email</option>
                        <option value="url">URL</option>
                        <option value="ipv4">IPv4 Address</option>
                        <option value="password">Strong Password</option>
                    </select>
                </div>
            </div>

            <div class="box">
                <label>Test String (Teks Pengujian)</label>
                <div class="textarea-container">
                    <div id="highlight-overlay"></div>
                    <textarea id="test-string" placeholder="Masukkan teks untuk diuji di sini..."></textarea>
                </div>
            </div>

            <div class="box">
                <label>Replacement String (Opsional)</label>
                <input type="text" id="replace-string" placeholder="Teks pengganti (gunakan $1, $2 untuk grup)">
                <textarea id="replace-output" readonly placeholder="Hasil penggantian akan muncul di sini..."></textarea>
            </div>
        </div>

        <div class="results-panel">
            <div class="results-header">
                <h3>Hasil Ekstraksi (<span id="match-count">0</span> Kecocokan) - <span id="exec-time">0.0</span>ms</h3>
                <div class="export-controls">
                    <button id="copy-btn" class="btn small">📋 Copy</button>
                    <button id="export-csv" class="btn small">📄 CSV</button>
                    <button id="export-json" class="btn small">🤖 JSON</button>
                </div>
            </div>
            <div id="result-output" class="output-box">
                <p class="placeholder-text">Masukkan regex untuk melihat hasil...</p>
            </div>
        </div>

        <div class="code-panel">
            <div class="code-header">
                <h3>Code Generator</h3>
                <select id="code-lang">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="php">PHP</option>
                </select>
                <button id="copy-code-btn" class="btn small">📋 Copy Code</button>
            </div>
            <pre><code id="code-snippet">Pilih atau tulis regex terlebih dahulu...</code></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
